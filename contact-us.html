<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us - Aquila Visuals</title>
        <link rel="stylesheet" href="style.css?v=1">
        <script src="https://kit.fontawesome.com/1a93040285.js" crossorigin="anonymous"></script>
        <!-- https://fontawesome.com/kits/1a93040285/icons -->
    </head>
    <body>
        <div class="wrapper">
            <h1>contact us<span class="blue-punct">?</span></h1>
            <p>Feel free to reach out to us through our DM's with any questions or feedback<span class="blue-punct">!</span></p>
            <h2>Get in touch</h2>
            <hr>
            <form action="https://formsubmit.co/helloaquilavisuals@gmail.com"  method="POST" class="contact-form">
                <input type="hidden" name="_next" value="https://aquilavisuals.co.uk/thank-you">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_captcha" value="false">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" name="Name" placeholder="Your Name" class="contact-inputs" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="Email" placeholder="Your Email" class="contact-inputs" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" name="Subject" placeholder="Subject" class="contact-inputs" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="Message" placeholder="Your Message" class="contact-inputs"></textarea>
                </div>
                <button type="submit">Submit<i class="fa-solid fa-paper-plane"></i></button>
            </form>
            <p></p>
            <div class="icons">
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
            </div>
        </div>
    </body>
</html>
